<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f6fa;
      }

      h1 {
        text-align: center;
      }

      input {
        padding: 8px;
        margin: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
        width: 200px;
      }

      button {
        padding: 6px 12px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #3498db;
        color: white;
      }

      button:hover {
        background: #2980b9;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }

      td, th {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      tr:hover {
        background: #f1f1f1;
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 400px;
      }

      /* Pagination */
      .pagination {
        margin-top: 10px;
        text-align: center;
      }

      /* Responsive */
      @media (max-width: 768px) {
        input {
          width: 100%;
        }

        table {
          font-size: 12px;
        }

        .modal-content {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      function App() {
        const [kw, setKeyword] = React.useState("");
        const [newUser, setNewUser] = React.useState(null);
        return (
          <div>
            <h1>Quản lý người dùng</h1>
            <SearchForm onChangeValue={setKeyword} />
            <AddUser onAdd={setNewUser} />
            <ResultTable
              keyword={kw}
              newUser={newUser}
              onAdded={() => setNewUser(null)}
            />
          </div>
        );
      }

      function SearchForm({ onChangeValue }) {
        return (
          <input
            type="text"
            placeholder="Tìm kiếm người dùng"
            onChange={(e) => onChangeValue(e.target.value)}
          />
        );
      }

      function ResultTable({ keyword, newUser, onAdded }) {
        const [users, setUsers] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        const [editing, setEditing] = React.useState(null);
        const [currentPage, setCurrentPage] = React.useState(1);
        const usersPerPage = 5;

        React.useEffect(() => {
          fetch("https://jsonplaceholder.typicode.com/users")
            .then((res) => res.json())
            .then((data) => {
              setUsers(data);
              setLoading(false);
            });
        }, []);

        React.useEffect(() => {
          if (newUser) {
            setUsers((prev) => [
              ...prev,
              { ...newUser, id: Math.max(...prev.map((u) => u.id)) + 1 },
            ]);
            onAdded();
          }
        }, [newUser]);

        const filteredUsers = users.filter(
          (u) =>
            u.name.toLowerCase().includes(keyword.toLowerCase()) ||
            u.username.toLowerCase().includes(keyword.toLowerCase()),
        );

        const indexOfLast = currentPage * usersPerPage;
        const indexOfFirst = indexOfLast - usersPerPage;
        const currentUsers = filteredUsers.slice(indexOfFirst, indexOfLast);

        function editUser(user) {
          setEditing({
            ...user,
            street: user.address.street,
            suite: user.address.suite,
            city: user.address.city,
          });
        }

        function handleSave() {
          setUsers((prev) =>
            prev.map((u) =>
              u.id === editing.id
                ? {
                    ...editing,
                    address: {
                      street: editing.street,
                      suite: editing.suite,
                      city: editing.city,
                    },
                  }
                : u,
            ),
          );
          setEditing(null);
        }

        function removeUser(user) {
          setUsers((prev) => prev.filter((u) => u.id !== user.id));
        }

        return (
          <div>
            <table>
              <tbody>
                {currentUsers.map((u) => (
                  <tr key={u.id}>
                    <td>{u.name}</td>
                    <td>{u.username}</td>
                    <td>{u.email}</td>
                    <td>{u.phone}</td>
                    <td>
                      {u.address.street}, {u.address.suite}, {u.address.city}
                    </td>
                    <td>
                      <button onClick={() => editUser(u)}>Sửa</button>
                      <button onClick={() => removeUser(u)}>Xóa</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div>
              {Array.from(
                { length: Math.ceil(filteredUsers.length / usersPerPage) },
                (_, i) => (
                  <button key={i} onClick={() => setCurrentPage(i + 1)}>
                    {i + 1}
                  </button>
                ),
              )}
            </div>

            {editing && (
              <div className="modal">
                <div className="modal-content">
                  <h4>Sửa người dùng</h4>
                  <label htmlFor="edit-name">Name: </label>
                  <input
                    id="edit-name"
                    type="text"
                    value={editing.name}
                    onChange={(e) =>
                      setEditing({ ...editing, name: e.target.value })
                    }
                  />
                  <label htmlFor="edit-username">Username: </label>
                  <input
                    id="edit-username"
                    type="text"
                    value={editing.username}
                    onChange={(e) =>
                      setEditing({ ...editing, username: e.target.value })
                    }
                  />
                  <label htmlFor="edit-email">Email: </label>
                  <input
                    id="edit-email"
                    type="text"
                    value={editing.email}
                    onChange={(e) =>
                      setEditing({ ...editing, email: e.target.value })
                    }
                  />
                  <label htmlFor="edit-phone">Phone: </label>
                  <input
                    id="edit-phone"
                    type="text"
                    value={editing.phone}
                    onChange={(e) =>
                      setEditing({ ...editing, phone: e.target.value })
                    }
                  />
                  <label htmlFor="edit-street">Street: </label>
                  <input
                    id="edit-street"
                    type="text"
                    value={editing.street}
                    onChange={(e) =>
                      setEditing({ ...editing, street: e.target.value })
                    }
                  />
                  <label htmlFor="edit-suite">Suite: </label>
                  <input
                    id="edit-suite"
                    type="text"
                    value={editing.suite}
                    onChange={(e) =>
                      setEditing({ ...editing, suite: e.target.value })
                    }
                  />
                  <label htmlFor="edit-city">City: </label>
                  <input
                    id="edit-city"
                    type="text"
                    value={editing.city}
                    onChange={(e) =>
                      setEditing({ ...editing, city: e.target.value })
                    }
                  />
                  <button onClick={handleSave}>Lưu</button>
                  <button onClick={() => setEditing(null)}>Hủy</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      function AddUser({ onAdd }) {
        const [adding, setAdding] = React.useState(false);
        const [user, setUser] = React.useState({
          name: "",
          username: "",
          email: "",
          address: {
            street: "",
            suite: "",
            city: "",
          },
          phone: "",
        });

        const handleChange = (e) => {
          const { id, value } = e.target;
          if (["street", "suite", "city"].includes(id)) {
            setUser({
              ...user,
              address: { ...user.address, [id]: value },
            });
          } else {
            setUser({ ...user, [id]: value });
          }
        };

        const handleAdd = () => {
          if (user.name === "" || user.username === "") {
            alert("Vui lòng nhập Name và Username!");
            return;
          }
          onAdd(user);
          setUser({
            name: "",
            username: "",
            email: "",
            address: {
              street: "",
              suite: "",
              city: "",
            },
            phone: "",
          });
          setAdding(false);
        };

        return (
          <div>
            <button onClick={() => setAdding(true)}>Thêm</button>
            {adding && (
              <div className="modal">
                <div className="modal-content">
                  <h4>Thêm người dùng</h4>
                  <label htmlFor="name">Name: </label>
                  <input
                    id="name"
                    type="text"
                    value={user.name}
                    onChange={handleChange}
                  />
                  <label htmlFor="username">Username: </label>
                  <input
                    id="username"
                    type="text"
                    value={user.username}
                    onChange={handleChange}
                  />
                  <label htmlFor="email">Email: </label>
                  <input
                    id="email"
                    type="text"
                    value={user.email}
                    onChange={handleChange}
                  />
                  <label htmlFor="phone">Phone: </label>
                  <input
                    id="phone"
                    type="text"
                    value={user.phone}
                    onChange={handleChange}
                  />
                  <label htmlFor="street">Street: </label>
                  <input
                    id="street"
                    type="text"
                    value={user.address.street}
                    onChange={handleChange}
                  />
                  <label htmlFor="suite">Suite: </label>
                  <input
                    id="suite"
                    type="text"
                    value={user.address.suite}
                    onChange={handleChange}
                  />
                  <label htmlFor="city">City: </label>
                  <input
                    id="city"
                    type="text"
                    value={user.address.city}
                    onChange={handleChange}
                  />
                  <button onClick={handleAdd}>Thêm</button>
                  <button onClick={() => setAdding(false)}>Hủy</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
